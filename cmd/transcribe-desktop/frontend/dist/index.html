<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transcribe Desktop</title>
  <style>
    html, body { margin:0; width:100%; height:100%; background:#0b1020; color:#eef3ff; font-family:Segoe UI, -apple-system, sans-serif; }
    #root { width:100%; height:100%; display:flex; flex-direction:column; }
    #header { padding:8px 12px; border-bottom:1px solid #243458; font-size:12px; color:#9fb0d4; }
    #status { margin-left:8px; }
    #frame { flex:1; width:100%; border:0; background:#111a33; }
  </style>
</head>
<body>
  <div id="root">
    <div id="header">Transcribe Desktop <span id="status">Connecting...</span></div>
    <iframe id="frame" title="Transcribe"></iframe>
  </div>
  <script>
    const status = document.getElementById('status');
    const frame = document.getElementById('frame');

    function setBackendURL(url) {
      if (!url) {
        status.textContent = 'Backend URL is empty';
        return;
      }
      status.textContent = 'Connected: ' + url;
      frame.src = url;
    }

    window.setBackendURL = setBackendURL;

    // In case JS injection from Go is delayed, poll for value.
    const timer = setInterval(() => {
      if (window.__BACKEND_URL) {
        clearInterval(timer);
        setBackendURL(window.__BACKEND_URL);
      }
    }, 100);
  </script>
</body>
</html>
