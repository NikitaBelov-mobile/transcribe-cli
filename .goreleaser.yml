version: 2
project_name: transcribe-cli

builds:
  - id: transcribe
    main: ./cmd/transcribe-cli
    binary: transcribe
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
