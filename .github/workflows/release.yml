name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      RELEASE_REPO: ${{ vars.RELEASE_REPO }}
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
      WINGET_REPO: ${{ vars.WINGET_REPO }}
      WINGET_PACKAGE_ID: ${{ vars.WINGET_PACKAGE_ID }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      WINGET_REPO_TOKEN: ${{ secrets.WINGET_REPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify required artifacts
        run: |
          set -euo pipefail
          ls -la dist
          ls dist/*_darwin_amd64.zip
          ls dist/*_darwin_arm64.zip
          ls dist/*_windows_amd64.zip
          ls dist/*_windows_arm64.zip

      - name: Update Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP_REPO != '' && env.RELEASE_REPO != '' }}
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          bash scripts/release/update-homebrew-tap.sh

      - name: Update Winget manifests repo
        if: ${{ env.WINGET_REPO_TOKEN != '' && env.WINGET_REPO != '' && env.RELEASE_REPO != '' && env.WINGET_PACKAGE_ID != '' }}
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          bash scripts/release/update-winget-manifests.sh

  desktop-windows:
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build transcribe engine
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-desktop/bundle
          go build -mod=mod -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o dist-desktop/bundle/transcribe.exe ./cmd/transcribe-cli

      - name: Publish native desktop GUI (WinUI 3)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-desktop/logs
          if ! dotnet publish desktop-windows-winui/TranscribeDesktop.WinUI.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:Platform=x64 \
            -p:PlatformTarget=x64 \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableMsixTooling=true \
            -p:WindowsAppSDKSelfContained=true \
            -p:Version=${GITHUB_REF_NAME#v} \
            -bl:dist-desktop/logs/winui-publish.binlog \
            -flp:logfile=dist-desktop/logs/winui-publish.log\;verbosity=diagnostic \
            -o dist-desktop/publish
          then
            echo "WinUI publish failed; showing diagnostic log tail:"
            tail -n 240 dist-desktop/logs/winui-publish.log || true
            exit 1
          fi
          cp -R dist-desktop/publish/. dist-desktop/bundle/

      - name: Upload WinUI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: winui-diagnostics-${{ github.run_id }}
          path: dist-desktop/logs/*

      - name: Pack desktop artifact
        shell: powershell
        run: |
          Compress-Archive -Path dist-desktop/bundle/* -DestinationPath dist-desktop/transcribe-desktop_${{ github.ref_name }}_windows_amd64.zip

      - name: Upload desktop artifact to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          asset="dist-desktop/transcribe-desktop_${GITHUB_REF_NAME}_windows_amd64.zip"
          # Retry upload to handle transient GitHub API "Unicorn" failures.
          for i in 1 2 3; do
            if gh release upload "${GITHUB_REF_NAME}" "${asset}" --clobber; then
              exit 0
            fi
            echo "Upload attempt ${i} failed, retrying..."
            sleep 5
          done
          echo "Failed to upload desktop artifact after retries."
          exit 1
