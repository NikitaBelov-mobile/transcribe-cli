name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' && vars.HOMEBREW_TAP_REPO != '' && vars.RELEASE_REPO != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          RELEASE_REPO: ${{ vars.RELEASE_REPO }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          bash scripts/release/update-homebrew-tap.sh

      - name: Update Winget manifests repo
        if: ${{ secrets.WINGET_REPO_TOKEN != '' && vars.WINGET_REPO != '' && vars.RELEASE_REPO != '' && vars.WINGET_PACKAGE_ID != '' }}
        env:
          WINGET_REPO_TOKEN: ${{ secrets.WINGET_REPO_TOKEN }}
          WINGET_REPO: ${{ vars.WINGET_REPO }}
          WINGET_PACKAGE_ID: ${{ vars.WINGET_PACKAGE_ID }}
          RELEASE_REPO: ${{ vars.RELEASE_REPO }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          bash scripts/release/update-winget-manifests.sh
