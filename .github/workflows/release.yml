name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      RELEASE_REPO: ${{ vars.RELEASE_REPO }}
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
      WINGET_REPO: ${{ vars.WINGET_REPO }}
      WINGET_PACKAGE_ID: ${{ vars.WINGET_PACKAGE_ID }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      WINGET_REPO_TOKEN: ${{ secrets.WINGET_REPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify required artifacts
        run: |
          set -euo pipefail
          ls -la dist
          ls dist/*_darwin_amd64.zip
          ls dist/*_darwin_arm64.zip
          ls dist/*_windows_amd64.zip
          ls dist/*_windows_arm64.zip

      - name: Update Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP_REPO != '' && env.RELEASE_REPO != '' }}
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          bash scripts/release/update-homebrew-tap.sh

      - name: Update Winget manifests repo
        if: ${{ env.WINGET_REPO_TOKEN != '' && env.WINGET_REPO != '' && env.RELEASE_REPO != '' && env.WINGET_PACKAGE_ID != '' }}
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          bash scripts/release/update-winget-manifests.sh

  desktop-windows:
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build desktop executable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-desktop
          go build -mod=mod -tags desktop -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -H=windowsgui" -o dist-desktop/transcribe-desktop.exe ./cmd/transcribe-desktop

      - name: Pack desktop artifact
        shell: powershell
        run: |
          Compress-Archive -Path dist-desktop/transcribe-desktop.exe -DestinationPath dist-desktop/transcribe-desktop_${{ github.ref_name }}_windows_amd64.zip

      - name: Upload desktop artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist-desktop/transcribe-desktop_${{ github.ref_name }}_windows_amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
